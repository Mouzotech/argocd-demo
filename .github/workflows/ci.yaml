name: build-and-deploy

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "Dockerfile"
      - ".github/workflows/ci.yaml"

permissions:
  contents: write
  packages: write

env:
  IMAGE: ghcr.io/mouzotech/argocd-demo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login en ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y push de la imagen
        run: |
          TAG=${GITHUB_SHA::7}
          docker build -t "$IMAGE:$TAG" -t "$IMAGE:latest" .
          docker push "$IMAGE:$TAG"
          docker push "$IMAGE:latest"

      - name: Actualizar tag en el manifest (GitOps)
        run: |
          TAG=${GITHUB_SHA::7}
          sed -i "s|image: ghcr.io/mouzotech/argocd-demo:.*|image: ghcr.io/mouzotech/argocd-demo:$TAG|" manifests/deployment.yaml
          git config user.name "ci-bot"
          git config user.email "ci-bot@users.noreply.github.com"
          git add manifests/deployment.yaml
          git commit -m "ci: desplegar imagen $TAG [skip ci]"
          git pull --rebase origin main
          git push origin main
